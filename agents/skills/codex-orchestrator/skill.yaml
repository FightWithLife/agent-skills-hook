name: codex-orchestrator
version: 1.0.0
description: |
  Orchestrate development workflow where Claude acts as architect and validator,
  while Codex CLI executes the implementation.
  This skill is the default path for medium/complex coding tasks, even when
  user does not explicitly mention Codex.

  Workflow:
  1. Claude analyzes requirements and creates detailed technical plan
  2. Claude calls Codex CLI to execute implementation
  3. Claude validates results (code review, tests, performance, architecture)
  4. If validation fails, Claude asks user for guidance and iterates
  5. Once validated, Claude commits the changes

trigger: |
  Use when:
  - user explicitly requests Codex execution; or
  - task is medium/complex coding work (multi-file, multi-step, or expected >50 lines).

  Explicit trigger phrases include:
  - "使用 codex 实现"
  - "让 codex 来做"
  - "codex 执行"
  - "use codex to implement"

  Do NOT trigger for:
  - Simple changes (<50 lines, single-file, clear requirement)
  - Direct file edits requested by user
  - Research or exploration tasks

instructions: |
  # Codex Orchestrator Workflow

  ## Phase 1: Planning (Claude)

  1. Analyze user requirements thoroughly
  2. Decompose into implementable subtasks with clear acceptance criteria
  3. Read relevant architecture docs from PCL6/docs/architecture_zh/ (if applicable)
  4. Create detailed technical plan including:
     - Files to modify/create
     - Key functions/modules affected
     - Architecture considerations
     - Acceptance criteria (specific and measurable)
  5. Present plan to user for approval

  ## Phase 2: Execution (Codex)

  1. Construct Codex command with detailed prompt using the quiet wrapper:
     ```bash
     CODEX_QUIET_WORKDIR=/home/xmg/code/PCL /home/xmg/.local/bin/codex-quiet "
     [Detailed implementation instructions]

     Working directory: /home/xmg/code/PCL

     Requirements:
     - Follow existing code style
     - Add Chinese comments for new code
     - Add Doxygen-style Chinese comments for new functions
     - Maintain minimal changes
     - Follow architecture in PCL6/docs/architecture_zh/

     Files to modify: [list]
     Acceptance criteria: [list]

     Output constraints:
     - Return concise markdown only
     - No full-file dumps or full logs
     - Keep final output under 200 lines
     "
     ```

  2. IMPORTANT: Always use `/home/xmg/.local/bin/codex-quiet` instead of `codex` or `codex exec`
  3. The quiet wrapper suppresses verbose output and returns only final results
  4. Execute and capture output
  5. Check for execution errors

  ## Phase 3: Validation (Claude)

  Run comprehensive validation in this order:

  ### 3.1 Code Review
  - Use `Skill(skill: "requesting-code-review")` or manual review
  - Check for:
    - Code quality issues
    - Security vulnerabilities
    - Style consistency
    - Comment completeness (Chinese, Doxygen format)

  ### 3.2 Build Test
  ```bash
  cd PCL6 && make clean && make -j$(nproc)
  ```
  - Must compile without errors
  - Check for new warnings

  ### 3.3 Functional Test
  - Run relevant .prn test files
  - Verify output correctness
  - Check for regressions

  ### 3.4 Performance Check
  - Compare before/after performance if relevant
  - Check memory usage
  - Verify no obvious performance degradation

  ### 3.5 Architecture Compliance
  - Verify changes follow PCL6 architecture guidelines
  - Check module boundaries are respected
  - Ensure no parallel implementations created
  - Validate against PCL6/docs/architecture_zh/04_change_guidelines.md

  ## Phase 4: Iteration (if validation fails)

  1. Summarize validation failures clearly
  2. Use AskUserQuestion to present options:
     - "Validation failed with [issues]. How should we proceed?"
     - Options:
       a) "Let Codex fix the issues automatically"
       b) "I'll provide specific guidance for fixes"
       c) "Let Claude fix the issues directly"
       d) "Abort and review manually"

  3. Based on user choice:
     - Option a: Call Codex again with failure feedback using codex-quiet
     - Option b: Wait for user guidance, then call Codex using codex-quiet
     - Option c: Claude fixes issues directly
     - Option d: Stop and report status

  4. Repeat validation after fixes
  5. Maximum 3 iterations before escalating to user

  ## Phase 5: Completion

  1. Once all validations pass, use git-master skill to commit:
     ```
     Skill(skill: "git-master")
     ```

  2. Provide completion summary:
     - What was implemented
     - Validation results (all passed)
     - Files changed
     - Suggested next steps

  ## Error Handling

  - If Codex fails to execute: report error and ask user
  - If validation fails 3 times: escalate to user with full context
  - If build fails: provide build log and ask for guidance
  - If tests fail: provide test output and ask for guidance

  ## Notes

  - Always use `/home/xmg/.local/bin/codex-quiet` for Codex delegation
  - The quiet wrapper is specifically designed for Claude-to-Codex workflow
  - Do NOT use `codex` or `codex exec` directly unless user explicitly requests
  - Keep Codex prompts detailed and specific
  - Include architecture context in Codex prompts
  - Validate thoroughly before claiming success
