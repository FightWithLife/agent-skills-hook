model = "gpt-5.4"
model_reasoning_effort = "medium"
approval_policy = "never"
sandbox_mode = "workspace-write"
disable_response_storage = true
windows_wsl_setup_acknowledged = true
web_search = "cached"
file_opener = "vscode"

[history]
persistence = "save-all"

[tui]
notifications = true

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = false

[sandbox_workspace_write]
network_access = true

[features]
plan_tool = true
apply_patch_freeform = true
view_image_tool = true
rmcp_client = true

[profiles.light]
approval_policy = "never"
sandbox_mode = "workspace-write"
model = "gpt-5.4"
model_reasoning_effort = "low"

[profiles.review]
approval_policy = "never"
sandbox_mode = "read-only"
model = "gpt-5.4"
model_reasoning_effort = "high"

[profiles.orchestrated]
approval_policy = "never"
sandbox_mode = "workspace-write"
model = "gpt-5.4"
model_reasoning_effort = "high"

[profiles.claude_quiet]
approval_policy = "never"
sandbox_mode = "workspace-write"
model = "gpt-5.4"
model_reasoning_effort = "low"

[notice]
hide_gpt5_1_migration_prompt = true
hide_full_access_warning = true
hide_rate_limit_model_nudge = true

[mcp_servers.github]
enabled = true

[mcp_servers.context7]
enabled = true

[mcp_servers.memory]
enabled = true

[mcp_servers.sequential-thinking]
enabled = true

[agents.explorer]
description = "Read-only embedded C investigation, call-path tracing, and build context lookup"
profile = "review"

[agents.architect]
description = "Design or review embedded firmware architecture, boundaries, and evolution paths"
profile = "review"

[agents.planner]
description = "Plan multi-file firmware changes, init sequencing, and risk-controlled implementation"
profile = "orchestrated"

[agents.worker]
description = "Implement isolated embedded C or build-system changes with minimal diffs"
profile = "light"

[agents.build-resolver]
description = "Repair Make/CMake, toolchain, compile, link, include, and macro failures"
profile = "orchestrated"

[agents.firmware-reviewer]
description = "Review ISR, volatile, register, DMA, timeout, and memory-safety risks"
profile = "review"

[agents.hardware-impact]
description = "Assess peripheral, board-support, bus, pinmux, and clocking impact"
profile = "review"

[agents.reviewer]
description = "Final regression and maintainability review after changes land"
profile = "review"

[agents.monitor]
description = "Watch builds, tests, serial logs, or flash output and report concise status"
profile = "light"
