# Copy only the sections you need into ~/.codex/config.toml.
# Keep repo defaults generic and place personal providers, models, and trusted
# project paths in your local config only.

[profiles.claude_quiet]
approval_policy = "never"
sandbox_mode = "workspace-write"
model = "gpt-5.4"
model_reasoning_effort = "low"

[profiles.orchestrated]
approval_policy = "never"
sandbox_mode = "workspace-write"
model = "gpt-5.4"
model_reasoning_effort = "high"

[profiles.review]
approval_policy = "never"
sandbox_mode = "read-only"
model = "gpt-5.4"
model_reasoning_effort = "high"

[model_providers.example]
name = "example"
base_url = "https://api.example.invalid/v1"
wire_api = "responses"
requires_openai_auth = true

[projects."/absolute/path/to/firmware-repo"]
trust_level = "trusted"

[mcp_servers.github]
enabled = true

[mcp_servers.context7]
enabled = true

[mcp_servers.memory]
enabled = true

[mcp_servers.sequential-thinking]
enabled = true
