# 只把你需要的部分复制到 ~/.codex/config.toml。
# 保持仓库默认值通用，把个人提供方、模型和受信任项目路径只放到本地配置里。

[profiles.claude_quiet]
approval_policy = "never"
sandbox_mode = "workspace-write"
model = "gpt-5.4"
model_reasoning_effort = "low"

[profiles.orchestrated]
approval_policy = "never"
sandbox_mode = "workspace-write"
model = "gpt-5.4"
model_reasoning_effort = "high"

[profiles.review]
approval_policy = "never"
sandbox_mode = "read-only"
model = "gpt-5.4"
model_reasoning_effort = "high"

[model_providers.example]
name = "example"
base_url = "https://api.example.invalid/v1"
wire_api = "responses"
requires_openai_auth = true

[projects."/absolute/path/to/firmware-repo"]
trust_level = "trusted"

[mcp_servers.github]
enabled = true

[mcp_servers.context7]
enabled = true

[mcp_servers.memory]
enabled = true

[mcp_servers.sequential-thinking]
enabled = true
