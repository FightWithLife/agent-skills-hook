model = "gpt-5.4"
model_reasoning_effort = "medium"
approval_policy = "never"
sandbox_mode = "workspace-write"
disable_response_storage = true
windows_wsl_setup_acknowledged = true
profile = "auto-max"
file_opener = "vscode"
model_provider = "synai"
web_search = "cached"

[history]
persistence = "save-all"

[tui]
notifications = true

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = false

[sandbox_workspace_write]
network_access = true

[features]
plan_tool = true
apply_patch_freeform = true
view_image_tool = true
unified_exec = false
rmcp_client = true

[profiles.light]
approval_policy = "never"
sandbox_mode = "workspace-write"
model = "gpt-5.4"
model_reasoning_effort = "low"

[profiles.review]
approval_policy = "never"
sandbox_mode = "read-only"
model = "gpt-5.4"
model_reasoning_effort = "high"

[profiles.orchestrated]
approval_policy = "never"
sandbox_mode = "workspace-write"
model = "gpt-5.4"
model_reasoning_effort = "high"

[profiles.claude_quiet]
approval_policy = "never"
sandbox_mode = "workspace-write"
model = "gpt-5.4"
model_reasoning_effort = "low"

[notice]
hide_gpt5_1_migration_prompt = true
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[model_providers.synai]
name = "synai"
base_url = "https://api.zybulid.xyz/v1"
wire_api = "responses"
requires_openai_auth = true

[mcp_servers.github]
enabled = true

[mcp_servers.context7]
enabled = true

[mcp_servers.memory]
enabled = true

[mcp_servers.sequential-thinking]
enabled = true

[agents.explorer]
description = "只读的嵌入式 C 调查、调用路径追踪和构建上下文检索"
profile = "review"

[agents.architect]
description = "设计或复核嵌入式固件架构、边界和演进路径"
profile = "review"

[agents.planner]
description = "规划多文件固件改动、初始化顺序和受风险控制的实施"
profile = "orchestrated"

[agents.worker]
description = "以最小 diff 实现隔离的嵌入式 C 或构建系统改动"
profile = "light"

[agents.build-resolver]
description = "修复 Make/CMake、工具链、编译、链接、包含和宏失败"
profile = "orchestrated"

[agents.firmware-reviewer]
description = "复核 ISR、volatile、寄存器、DMA、超时和内存安全风险"
profile = "review"

[agents.hardware-impact]
description = "评估外设、板级支持、总线、引脚复用和时钟配置影响"
profile = "review"

[agents.reviewer]
description = "变更落地后的最终回归与可维护性复核"
profile = "review"

[agents.monitor]
description = "观察构建、测试、串口日志或刷写输出并简要汇报状态"
profile = "light"

[projects."/home/xmg"]
trust_level = "trusted"
